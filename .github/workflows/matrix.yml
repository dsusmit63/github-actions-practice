---
name: Matrix Workflow

on:
  workflow_dispatch:

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: ["ubuntu:latest", "windows-latest"]
        exclude:
          - os: windows-latest
            python-version: "3.10"
    
    steps:
      - name: Setup python ${{ matrix.python-version }}
        run: actions/setup-python@v5
          
      - name: Print python version
        run: python --version

      - name: Simulate error
        run: exit 1
